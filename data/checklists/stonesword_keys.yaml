        data_it: ["Dal Bastione orientale della capitale, segui il bastione verso sud fino a poco prima della porta di un edificio pieno di piante, calati dai bastioni sui tetti e salta tra i tetti tornando verso nord, finché non trovi la chiave su un cadavere vicino a due Gargoyle."]
