title: "Stonesword Keys & Imp Seals"
title_it: "Chiavi della spada di pietra e Sigilli delle statue di gargoyle"
id: stonesword
icon: "/img/icons/keys/00228.png"
description: "Stonesword Keys are consumable key items that open Imp Statue Seals, which typically guard loot, dungeons, or optional paths. A maximum of 81 Stonesword Keys can be found in the game, plus 2 if chosen as a Keepsake. However, only 46 are required to open every Imp Statue Seal. Imp Statues each require either 1 or 2 keys, and the only way to tell the difference is by visual examination: most Imp Statues already have one key in them when you find them, meaning you only need one more."
description_it: "Le chiavi della spada di pietra sono oggetti consumabili che aprono i sigilli delle statue di gargoyle, che solitamente sorvegliano bottini, dungeon o percorsi opzionali. Nel gioco si possono trovare un massimo di 81 chiavi, più 2 se scelte come dono iniziale. Tuttavia, ne sono necessarie solo 46 per aprire ogni sigillo. Ogni statua richiede 1 o 2 chiavi, e l'unico modo per capire la differenza è tramite un esame visivo: la maggior parte delle statue ha già una chiave inserita, il che significa che ne serve solo un'altra."
