title: Illusory Walls & Invisible Paths
title_it: Muri illusori e sentieri invisibili
id: illusory_walls
table_widths: [2, 3, 7]
sections:
  -
    title: Liurnia of the Lakes
    title_it: Liurnia Lacustre
    link: https://eldenring.wiki.fextralife.com/Liurnia+of+the+Lakes
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "1_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+Crystal+Cave\">Academy Crystal Cave</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Crystal+Staff\">Crystal Staff</a>", "After entering through a wooden door, there is a room guarded by a tanky mage with a pointy hat. Before entering that room, the illusory wall is to the left."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+Crystal+Cave\">Caverna di cristallo dell'Accademia</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Crystal+Staff\">Bastone di cristallo</a>", "Dopo essere entrati da una porta di legno, troverete una stanza sorvegliata da un mago molto resistente con un cappello a punta. Prima di entrare in quella stanza, il muro illusorio si trova a sinistra."]
      - id: "1_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Academy of Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Rune+Arc\">Rune Arc</a>", "The wall to the right just upon entering the Church of the Cuckoo.	"]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Accademia di Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Rune+Arc\">Arco runico</a>", "Il muro sulla destra appena entrati nella Chiesa del cuculo."]
      - id: "1_3"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Academy of Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Smithing+Stone+(4)\">Smithing Stone [4]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Olivinus+Glintstone+Crown\">Olivinus Glintstone Crown</a>", "Bookshelf by the corpse in the room to the left in the hallway just after the Schoolhouse Classroom site of grace."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Accademia di Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Smithing+Stone+(4)\">Pietra da forgiatura [4]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Olivinus+Glintstone+Crown\">Corona di pietre luccicanti di Olivinus</a>", "Lo scaffale vicino al cadavere nella stanza a sinistra nel corridoio subito dopo il luogo di grazia Aula scolastica."]
      - id: "1_4"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Academy of Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Comet\">Comet</a>, <a href=\"https://eldenring.wiki.fextralife.com/Graven-School+Talisman\">Graven-School Talisman</a>, <a href=\"https://eldenring.wiki.fextralife.com/Stonesword+Key\">Stonesword Key</a>", "From the Debate Parlor site of grace head back the way to the mage's the right bookshelf near the stairs, the one with no books."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Academy+of+Raya+Lucaria\">Accademia di Raya Lucaria</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Comet\">Cometa</a>, <a href=\"https://eldenring.wiki.fextralife.com/Graven-School+Talisman\">Amuleto della scuola degli scoliti</a>, <a href=\"https://eldenring.wiki.fextralife.com/Stonesword+Key\">Chiave della spada di pietra</a>", "Dal luogo di grazia Aula del dibattito, torna indietro verso i maghi: lo scaffale sulla destra vicino alle scale, quello senza libri, è illusorio."]
      - id: "1_5"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Black+Knife+Catacombs\">Black Knife Catacombs</a>", "Optional Boss  <a href=\"https://eldenring.wiki.fextralife.com/Black+Knife+Assassin\">Black Knife Assassin</a>", "Ride the knife traps up, at the end of the hall, hit the wall to access an Optional Boss."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Black+Knife+Catacombs\">Catacombe dei Neri Coltelli</a>", "Boss opzionale <a href=\"https://eldenring.wiki.fextralife.com/Black+Knife+Assassin\">Assassina dei Neri Coltelli</a>", "Sali sulle trappole a lama; alla fine del corridoio, colpisci il muro per accedere a un boss opzionale."]
      - id: "1_6"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Kingsrealm+Ruins\">Kingsrealm Ruins</a>", "Areas north of Kingsrealm Ruins", "This illusory wall is located north side of Kingsrealm Ruins, blocking the road, posing as a large brick wall. Hit it to see the road ahead and continue to the manor."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Kingsrealm+Ruins\">Rovine del reame reale</a>", "Aree a nord delle Rovine del reame reale", "Questo muro illusorio si trova sul lato nord delle Rovine del reame reale e blocca la strada presentandosi come un grande muro di mattoni. Colpiscilo per rivelare il percorso e proseguire verso il maniero."]
      - id: "1_7"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Kingsrealm+Ruins\">Kingsrealm Ruins</a>", "Optional Boss <a href=\"https://eldenring.wiki.fextralife.com/Royal+Revenant\">Royal Revenant</a>", "The stairs leading down into an underground area is covered by an illusory floor."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Kingsrealm+Ruins\">Rovine del reame reale</a>", "Boss opzionale <a href=\"https://eldenring.wiki.fextralife.com/Royal+Revenant\">Reietto reale</a>", "Le scale che scendono nell'area sotterranea sono coperte da un pavimento illusorio."]
      - id: "1_8"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Moonfolk+Ruins\">Moonfolk Ruins</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Somber+Smithing+Stone+(8)\">Somber Smithing Stone [8]</a>", "This illusory floor is located in the northeast part of the ruins.	"]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Moonfolk+Ruins\">Rovine del popolo lunare</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Somber+Smithing+Stone+(8)\">Pietra da forgiatura funerea [8]</a>", "Questo pavimento illusorio si trova nella parte nord-est delle rovine."]
      - id: "1_9"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Road's+End+Catacombs\">Road's End Catacomb</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Ghost+Glovewort+(2)\">Ghost Glovewort (2)</a>, <a href=\"https://eldenring.wiki.fextralife.com/Rune+Arc\">Rune Arc</a>, <a href=\"https://eldenring.wiki.fextralife.com/Root+Resin\">Root Resin</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Grovewort+(2)\">Grave Glovewort [2]</a>, Optional Boss  <a href=\"https://eldenring.wiki.fextralife.com/Spirit-Caller+Snail\">Spirit-Caller Snail</a>, <a href=\"https://eldenring.wiki.fextralife.com/Glintstone+Sorcerer+Ashes\">Glintstone Sorcerer Ashes</a>, <a href=\"https://eldenring.wiki.fextralife.com/Watchdog's+Staff\">Watchdog's Staff</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(3)\">Grave Glovewort (3)</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Violet\">Grave Violet</a>", "The first 2 are one floor below the lever, in the stone archways, both of them lead to the same area, it continues on with another illusory wall, then another one, until you find the boss room. The second 2 are two floors below the lever, in the stone archways, both are next to each other, leading to the same area. The last wall in the catacombs leads to a dead end area with a chest."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Road's+End+Catacombs\">Catacombe di fine strada</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Ghost+Glovewort+(2)\">Convallaria spettrale (2)</a>, <a href=\"https://eldenring.wiki.fextralife.com/Rune+Arc\">Arco runico</a>, <a href=\"https://eldenring.wiki.fextralife.com/Root+Resin\">Resina di radice</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Grovewort+(2)\">Convallaria sepolcrale [2]</a>, Boss opzionale <a href=\"https://eldenring.wiki.fextralife.com/Spirit-Caller+Snail\">Lumaca chiama-spiriti</a>, <a href=\"https://eldenring.wiki.fextralife.com/Glintstone+Sorcerer+Ashes\">Ceneri di stregone di pietre luccicanti</a>, <a href=\"https://eldenring.wiki.fextralife.com/Watchdog's+Staff\">Bastone del cane da guardia</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(3)\">Convallaria sepolcrale (3)</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Violet\">Viola tombale</a>", "I primi due si trovano un piano sotto la leva, negli archi di pietra; entrambi conducono alla stessa area che prosegue con altri muri illusori fino alla stanza del boss. I successivi due si trovano due piani sotto la leva, negli archi di pietra, l'uno vicino all'altro. L'ultimo muro nelle catacombe conduce a un vicolo cieco con un forziere."]
      - id: "1_10"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Three+Sisters\">Three Sisters</a>", "N/A", "The wall is located on the ground in the Ruined area at the west end. Hit or roll onto it to reveal it. Just below, there is another Illusory Wall that reveals an NPC that appears to be <a href=\"https://eldenring.wiki.fextralife.com/Sorceress+Sellen\">Sorceress Sellen</a>, though in Stasis."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Three+Sisters\">Tre Sorelle</a>", "N/D", "Il muro si trova a terra nell'area in rovina all'estremità occidentale. Colpiscilo o rotolaci sopra per rivelarlo. Subito sotto c'è un altro muro illusorio che rivela un NPC che sembra essere <a href=\"https://eldenring.wiki.fextralife.com/Sorceress+Sellen\">Sellen, la strega</a>, sebbene in stasi."]
  -
    title: Caelid
    title_it: Caelid
    link: https://eldenring.wiki.fextralife.com/Caelid
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "2_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Caelid+Catacombs\">Caelid Catacombs</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Miranda+Sprout+Ashes\">Miranda Sprout Ashes</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(5)\">Grave Glovewort [5]</a>", "After descending the staircase that leads onto a swamp, turn to the right, go under the platform where the Archer Skeleton was, and hit wall on the right corner. At the end of the dungeon, there will be a locked door. Once you see it, turn 180 and then attack the wall on the column in the middle of the previous room."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Caelid+Catacombs\">Catacombe di Caelid</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Miranda+Sprout+Ashes\">Ceneri di germoglio di Miranda</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(5)\">Convallaria sepolcrale [5]</a>", "Dopo essere scesi lungo la scalinata che porta a una palude, gira a destra, vai sotto la piattaforma dove si trovava l'arciere scheletrico e colpisci il muro nell'angolo a destra. Alla fine del dungeon troverai una porta chiusa: gira di 180 gradi e attacca il muro sulla colonna al centro della stanza precedente."]
      - id: "2_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Sellia+Hideaway\">Sellia Hideaway</a>", "N/A", "Entrance found behind an illusionary wall of rock. Illusory wall in the sloped area leading down to the boss room."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Sellia+Hideaway\">Rifugio di Sellia</a>", "N/D", "L'ingresso si trova dietro una parete di roccia illusoria. Un altro muro illusorio si trova nell'area in pendenza che scende verso la stanza del boss."]
  -
    title: Altus Plateau
    title_it: Altopiano di Altus
    link: https://eldenring.wiki.fextralife.com/Altus+Plateau
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "3_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Auriza+Side+Tomb\">Auriza Side Tomb</a>", "Complete the Dungeon", "In the final room after using the first teleporter trap, when facing the chest in the room, there is an illusory wall on the left side."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Auriza+Side+Tomb\">Tomba secondaria di Auriza</a>", "Completa il dungeon", "Nella stanza finale dopo aver usato la prima trappola teletrasportante, guardando il forziere nella stanza, c'è un muro illusorio sul lato sinistro."]
      - id: "3_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Mirage+Rise\">Mirage Rise</a>", "Entrance to the Rise", "East-Southeast of the Bower of Bounty Grace, up a little cliff, it's an illusory rock part of the Mirage Riddle."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Mirage+Rise\">Guglia miraggio</a>", "Ingresso della Guglia", "A est-sud-est del luogo di grazia Giardino della generosità, su una piccola scogliera; si tratta di una roccia illusoria che fa parte dell'Enigma del miraggio."]
      - id: "3_3"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Sage's+Cave\">Sage's Cave</a>", "N/A", "There’s an illusory wall near the path past the campfire, with another one along the way. The wall between the two bazaars is actually an illusory wall as well. There are also two illusory walls in the middle of the waterfall with two chests in the middle."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Sage's+Cave\">Caverna del saggio</a>", "N/D", "C'è un muro illusorio vicino al sentiero oltre il fuoco da campo, con un altro lungo la strada. Anche il muro tra i due bazar è in realtà un muro illusorio. Ci sono inoltre due muri illusori al centro della cascata con due forzieri nel mezzo."]
      - id: "3_4"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Sainted+Hero's+Grave\">Sainted Hero's Grave</a>", "N/A", "Past the site of grace take the left passage down the stairs, follow the corridor until the end into the room with the two bell casters up the stairs past them the wall behind them is Illusory."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Sainted+Hero's+Grave\">Tomba dell'eroe santo</a>", "N/D", "Oltre il luogo di grazia, prendi il passaggio a sinistra giù per le scale; segui il corridoio fino alla fine nella stanza con i due banditori (quelli con le campane): salendo le scale dietro di loro, il muro è illusorio."]
      - id: "3_5"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Sealed+Tunnel\">Sealed Tunnel</a>", "N/A", "In Leyndell Royal Capital, there's a tunnel down at the lake outside the west entrance, the tunnel is apparently sealed with nothing in it, but hitting a cavity in one of the walls will open a path to a new area. The tunnel keeps going deeper and deeper and at the end of each hidden area, there's another illusory wall that you must hit to continue."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Sealed+Tunnel\">Galleria sigillata</a>", "N/D", "A Leyndell, capitale reale, c'è una galleria giù al lago fuori dall'ingresso occidentale. La galleria sembra sigillata e vuota, ma colpendo una cavità in uno dei muri si aprirà un percorso verso una nuova area. La galleria prosegue sempre più in profondità e alla fine di ogni area nascosta c'è un altro muro illusorio che devi colpire per continuare."]
      - id: "3_6"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Sealed+Tunnel\">Sealed Tunnel</a>", "N/A", "The first is between a summoning pool and a fire place. The next is behind a chest containing a ball bearing. After Dropping into a room filled with the exploding ball enemies a hidden wall can be found behind a bunch of crates and barrels opposite a stair case"]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Sealed+Tunnel\">Galleria sigillata</a>", "N/D", "Il primo si trova tra un'effigie di evocazione e un focolare. Il successivo è dietro un forziere contenente un globo cinereo. Dopo essere caduti in una stanza piena di nemici a forma di palla esplosiva, è possibile trovare un muro nascosto dietro un mucchio di casse e barili di fronte a una scalinata."]
  -
    title: Subterranean Shunning-Grounds
    title_it: Sotterranei dei rinnegati
    link: https://eldenring.wiki.fextralife.com/Subterranean+Shunning-Grounds
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "4_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Frenzied+Flame+Proscription\">Frenzied Flame Proscription</a>", "Alternative way to <a href=\"https://eldenring.wiki.fextralife.com/Deeproot+Depths\">Deeproot Depths</a>", "In one of the arches on the wall next to <a href=\"https://eldenring.wiki.fextralife.com/Hyetta\">Hyetta</a>'s final location, you'll find an Illusory Wall hiding a hallway leading to a chest with a Rune Arc. Another Illusory Wall can be found behind the chest and opens up to the Root-Facing Site of Grace."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Frenzied+Flame+Proscription\">Proscrizione della Fiamma Frenetica</a>", "Percorso alternativo per l' <a href=\"https://eldenring.wiki.fextralife.com/Deeproot+Depths\">Abisso fra le radici</a>", "In uno degli archi sul muro vicino alla posizione finale di <a href=\"https://eldenring.wiki.fextralife.com/Hyetta\">Hyetta</a>, troverai un muro illusorio che nasconde un corridoio con un forziere contenente un Arco runico. Un altro muro illusorio si trova dietro il forziere e si apre sul luogo di grazia Radice frontale."]
      - id: "4_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Leyndell+Catacombs\">Leyndell Catacombs</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Haligdrake+Talisman\">Haligdrake Talisman +1</a>", "Up the stairs from the Grace, up the elevator, in the room with unkillable enemies, next to the stairs up 2 walls, leading to the snail. This is also accessible via <a href=\"https://eldenring.wiki.fextralife.com/Leyndell,+Ashen+Capital\">Leyndall, Ashen Capital</a>."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Leyndell+Catacombs\">Catacombe di Leyndell</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Haligdrake+Talisman\">Amuleto del drago sacro +1</a>", "Dalle scale del luogo di grazia, prendi l'ascensore. Nella stanza con i nemici immortali, accanto alle scale, ci sono due muri che conducono alla lumaca. Accessibile anche tramite <a href=\"https://eldenring.wiki.fextralife.com/Leyndell,+Ashen+Capital\">Leyndell, capitale cinerea</a>."]
  -
    title: Forbidden Lands
    title_it: Terre proibite
    link: https://eldenring.wiki.fextralife.com/Forbidden+Lands
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "5_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Hidden+Path+to+the+Haligtree\">Hidden Path to the Haligtree</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(9)\">Grave Glovewort [9]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Silver+Scarab\">Silver Scarab</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(9)\">Grave Glovewort [9]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Hero's+Rune+(1)\">Hero's Rune [1]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Spelldrake+Talisman\">Spelldrake Talisman +2</a>, <a href=\"https://eldenring.wiki.fextralife.com/Blackflame+Monk+Amon\">Blackflame Monk Amon Ashes</a>, <a href=\"https://eldenring.wiki.fextralife.com/Deathroot\">Deathroot</a>", "From the Site of Grace, make your way back down the staircase in the main hall and stand where the broken section of railing is, it will be on your right hand side. Looking down, you should be able to see an alcove along the walls across the pit. Walk to the ledge and drop a Rainbow Stone or Glowstone, etc., to ensure solid landing. Walk forward to drop to the invisible floor. Once on the invisible floor, you can move straight ahead into the alcove. Keep following the hidden path from here to progress."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Hidden+Path+to+the+Haligtree\">Percorso segreto per l'Albero Sacro</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(9)\">Convallaria sepolcrale [9]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Silver+Scarab\">Scarabeo d'argento</a>, <a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(9)\">Convallaria sepolcrale [9]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Hero's+Rune+(1)\">Runa dell'eroe [1]</a>, <a href=\"https://eldenring.wiki.fextralife.com/Spelldrake+Talisman\">Amuleto del drago magico +2</a>, <a href=\"https://eldenring.wiki.fextralife.com/Blackflame+Monk+Amon\">Ceneri di Amon, monaco della Fiamma Nera</a>, <a href=\"https://eldenring.wiki.fextralife.com/Deathroot\">Radice mortale</a>", "Dal luogo di grazia, torna giù per la scalinata nella sala principale e fermati dove la ringhiera è rotta (alla tua destra). Guardando in basso, dovresti vedere un'alcova lungo le pareti oltre l'abisso. Avvicinati al bordo e lancia una Pietra dell'arcobaleno o una Pietra luccicante per assicurarti di cadere su un terreno solido. Cammina in avanti per cadere sul pavimento invisibile. Una volta lì, puoi muoverti dritto verso l'alcova. Segui il sentiero nascosto da qui per proseguire."]
  -
    title: Mountaintops of the Giants
    title_it: Vette dei Giganti
    link: https://eldenring.wiki.fextralife.com/Mountaintops+of+the+Giants
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "6_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Giant-Conquering+Hero's+Grave\">Giant-Conquering Hero's Grave</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Golden+Rune+(11)\">Golden Rune [11]</a>", "From the Grace, down the hallway where it opens up, turn right and it's the panel on the left."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Giant-Conquering+Hero's+Grave\">Tomba dell'eroe conquistatore di giganti</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Golden+Rune+(11)\">Runa aurea [11]</a>", "Dal luogo di grazia, scendi lungo il corridoio; quando si apre, gira a destra: il pannello a sinistra è illusorio."]
      - id: "6_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Giants'+Mountaintop+Catacombs\">Giants' Mountaintop Catacombs</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(8)\">Grave Glovewort [8]</a>", "In the secret lower part of the dungeon, located by raising the lift once you've taken it down to the first level. Once you've taken the lift downward and moved past the first room you'll be faced with 2 frost breath traps down a long hallway. The hidden wall is between the two traps on the right hand side just before the second trap."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Giants'+Mountaintop+Catacombs\">Catacombe delle Vette dei Giganti</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Grave+Glovewort+(8)\">Convallaria sepolcrale [8]</a>", "Nella parte inferiore segreta del dungeon, accessibile sollevando l'ascensore dopo averlo portato al primo livello inferiore. Una volta scesi con l'ascensore e superata la prima stanza, ti troverai di fronte a due trappole di soffio gelido in un lungo corridoio. Il muro nascosto si trova tra le due trappole, sul lato destro, poco prima della seconda."]
      - id: "6_3"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Heretical+Rise\">Heretical Rise</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Founding+Rain+of+Stars\">Founding Rain of Stars</a>", "You must head over to the other side of the ravine in the north and find the invisible bridge that takes you across. <a href=\"https://eldenring.wiki.fextralife.com/Interactive+Map?id=2804&lat=-63.42&lng=163.07&zoom=8&code=mapA\">See this for the bridge start location</a>. From here make your way across the ravine and as you reach the tower look to your left. You should see very faint mist that guides you on a winding path up to enter the tower from a balcony above. <b>Tip:</b> You can use Rainbow Stones or shoot arrows with a bow to mark safe spots to walk on."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Heretical+Rise\">Guglia eretica</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Founding+Rain+of+Stars\">Pioggia di stelle primordiale</a>", "Devi recarti sull'altro lato del burrone a nord e trovare il ponte invisibile che lo attraversa. <a href=\"https://eldenring.wiki.fextralife.com/Interactive+Map?id=2804&lat=-63.42&lng=163.07&zoom=8&code=mapA\">Vedi qui per la posizione iniziale del ponte</a>. Da qui attraversa il burrone e, quando raggiungi la torre, guarda alla tua sinistra. Dovresti vedere una nebbia molto tenue che ti guida lungo un sentiero tortuoso verso l'alto per entrare nella torre da un balcone soprastante. <b>Suggerimento:</b> Puoi usare le Pietre dell'arcobaleno o scoccare frecce con un arco per segnare i punti sicuri su cui camminare."]
  -
    title: Mt. Gelmir
    title_it: Monte Gelmir
    link: https://eldenring.wiki.fextralife.com/Mt+Gelmir
    table: ["Location", "Rewards", "Description"]
    table_it: ["Luogo", "Ricompense", "Descrizione"]
    items:
      - id: "7_1"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Volcano+Manor\">Volcano Manor</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Depraved+Perfumer+Carmaan+Ashes\">Depraved Perfumer Carmaan Ashes</a>", "After receiving the Drawing-Room Key from <a href=\"https://eldenring.wiki.fextralife.com/Tanith\">Tanith</a>, open the first door on the right in the hallway next to <a href=\"https://eldenring.wiki.fextralife.com/Tanith\">Tanith</a>. The back wall, right corner is illusory. Follow the hallway, when it opens up go to the path to the left, not the stairs, and all the way at the end of this hallway is an illusory wall on your left."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Volcano+Manor\">Villa Vulcano</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Depraved+Perfumer+Carmaan+Ashes\">Ceneri di Carmaan, profumiere depravato</a>", "Dopo aver ricevuto la Chiave del salotto da <a href=\"https://eldenring.wiki.fextralife.com/Tanith\">Tanith</a>, apri la prima porta a destra nel corridoio accanto a lei. Il muro in fondo, nell'angolo a destra, è illusorio. Segui il corridoio e, quando si apre, prendi il sentiero a sinistra (non le scale); in fondo a questo corridoio troverai un muro illusorio sulla tua sinistra."]
      - id: "7_2"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Volcano+Manor\">Volcano Manor</a>", "Opens a shortcut; probable glitch, it reforms", "From the site of grace, then through the hallway, first room to the right, then the through the path at the corner of the room guarded by snails, at some part in that path you will find a cavity on the left with a bit of illumination coming form the other side. This illusory wall requires multiple hits to open, about 50 times with a heavy weapon."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Volcano+Manor\">Villa Vulcano</a>", "Apre una scorciatoia; probabile glitch, il muro si riforma.", "Dal luogo di grazia, attraversa il corridoio, entra nella prima stanza a destra, poi prosegui lungo il sentiero nell'angolo della stanza sorvegliata dalle lumache. In un punto di quel sentiero troverai una cavità sulla sinistra con un po' di luce che proviene dall'altro lato. Questo muro illusorio richiede numerosi colpi per aprirsi, circa 50 con un'arma pesante."]
