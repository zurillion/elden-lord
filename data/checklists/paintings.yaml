        map_title: "Sorcerer Painting solution"
      - id: "11"
        icon: "/img/icons/weapons/dlc/12286.png"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Incursion+Painting\">Incursion Painting</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Serpent+Crest+Shield\">Serpent Crest Shield</a>", "Travel to the Greatbridge North Site of Grace, and head straight West until you can see the large bridge leading into Belurat Tower Settlement in the Distance."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Incursion+Painting\">Dipinto: Incursione</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Serpent+Crest+Shield\">Scudo crestato del serpente</a>", "Viaggia verso il Luogo di grazia Granponte nord e vai dritto a ovest finché non vedi in lontananza il grande ponte che porta a Belurat, insediamento della torre."]
      - id: "12"
        icon: "/img/icons/weapons/dlc/12294.png"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/The+Sacred+Tower+Painting\">The Sacred Tower Painting</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Spiraltree+Seal\">Spiraltree Seal</a>", "Found on the high ground above Temple Town Ruins. This area is accessed by a Spiritspring on the north side of the platform. Once up at the top, right past the Northern Nameless Mausoleum and down the western slope, explore until you find two jagged rocks. Look north-west while aligning the rocks to find the ghost."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/The+Sacred+Tower+Painting\">Dipinto: La torre sacra</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Spiraltree+Seal\">Sigillo dell'albero a spirale</a>", "Sulle alture sopra le Rovine della città del tempio. Area accessibile tramite una sorgente spiritica sul lato nord. Una volta in cima, oltre il Mausoleo senza nome settentrionale e giù per il pendio occidentale, esplora fino a trovare due rocce appuntite. Guarda a nord-ovest allineando le rocce per trovare il fantasma."]
      - id: "13"
        icon: "/img/icons/tools/edited/00788.png"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Domain+of+Dragons+Painting\">Domain of Dragons Painting</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Rock+Heart\">Rock Heart</a>", "Traveling to the Jagged Peak Mountainside site of grace and following a path south-west from the grace, across rugged terrain. Instead of proceeding South for the level, take the spiritspring to land slightly west and find a spot where the storm clears up."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Domain+of+Dragons+Painting\">Dipinto: Dominio dei draghi</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Rock+Heart\">Cuore di roccia</a>", "Dal Luogo di grazia Versante del Picco fagliato, segui il sentiero a sud-ovest attraverso il terreno accidentato. Invece di proseguire a sud per il livello, usa la sorgente spiritica per atterrare poco a ovest e trovare un punto dove la tempesta si placa."]
