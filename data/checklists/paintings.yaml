        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Resurrection+Painting\">Resurrection Painting</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Juvenile+Scholar+Cap\">Juvenile Scholar Cap</a>, <a href=\"https://eldenring.wiki.fextralife.com/Juvenile+Scholar+Robe\">Juvenile Scholar Robe</a> and <a href=\"https://eldenring.wiki.fextralife.com/Larval+Tear\">Larval Tear</a>", "Liurnia of the Lakes, start at the Behind Caria Manor Site of Grace and head slightly southeast until you arrive at a graveyard, behind a big rock you should see the spirit of the artist sitting in a chair."]
