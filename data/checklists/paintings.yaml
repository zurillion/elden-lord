        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Redmane+Painting\">Redmane Painting</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Ash+of+War:+Rain+of+Arrows\">Ash of War: Rain of Arrows</a>", "Caelid, off a cliff edge south east of the Minor Erdtree in Dragonbarrow where a powerful Magic weilding Golem will be. Once you've made your way down the roots and stone pillars, walk to the edge and you'll briefly see the spirit of a painter."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Redmane+Painting\">Dipinto: Criniera rossa</a>", "<a href=\"https://eldenring.wiki.fextralife.com/Ash+of+War:+Rain+of+Arrows\">Cenere di guerra: Pioggia di frecce</a>", "Caelid, dal ciglio di un dirupo a sud-est dell'Albero Madre minore nel Greppo del Drago dove si trova un potente Golem magico. Una volta sceso tra radici e pilastri, vai sul bordo per vedere lo spirito del pittore."]
        cords: [6063, 6323]
        map_title: "Redmane Painting solution"
