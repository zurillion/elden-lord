    items:
      - id: "2_1"
        icon: "/img/icons/tools/online/00626.png"
        data: ["Phantom Great Rune", "Granted and removed automatically", "Item for online play. Obtained when invading another world with Mohg's Great Rune activated. Grants the Blessing of Blood to enemies native to the invaded world."]
        data_it: ["Grande Runa fantasma", "Concessa e rimossa automaticamente", "Oggetto per il gioco online. Ottenuto invadendo un altro mondo con la Grande Runa di Mohg attivata. Conferisce la Benedizione del sangue ai nemici del mondo invaso."]
      - id: "2_2"
        icon: "/img/icons/keys/great_runes/03117.png"
        map_icon: "/map/icons/shadows/keys/great_runes/03117.png"
        map_icon_size: 45
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+the+Death-Prince\">Mending Rune of the Death-Prince</a>", "Received from Fia after completing her questline", "Rune gestated by Fia, the Deathbed Companion. Formed of the two hallowbrand half-wheels combined, it will embed the principle of life within Death into Order. Unlocks a variant of the Elden Lord ending."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+the+Death-Prince\">Runa risolutiva del Principe della Morte</a>", "Ottenuta da Fia dopo aver completato la sua missione", "Runa gestata da Fia, la compagna del crepuscolo. Formata dall'unione dei due mezzi marchi della maledizione, incorpora il principio della vita nella Morte nell'Ordine. Sblocca una variante del finale Lord ancestrale."]
        cords: [5704, 10698]
        map_title: "Mending Rune of the Death-Prince"
      - id: "2_3"
        icon: "/img/icons/keys/great_runes/edited/03118.png"
        map_icon: "/map/icons/shadows/keys/great_runes/03118.png"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+the+Fell+Curse\">Mending Rune of the Fell Curse</a>", "Dropped by Dung Eater after completing his questline", "Loathsome rune gestated by the Dung Eater. The reviled curse will last eternally, and the world's children, grandchildren, and every generation hence, will be its pustules. Unlocks a variant of the Elden Lord ending."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+the+Fell+Curse\">Runa risolutiva della Maledizione funesta</a>", "Lasciata dal Mangiatori di feci dopo aver completato la sua missione", "Runa abominevole gestata dal Mangiatori di feci. La detestata maledizione durerà in eterno, e i figli, i nipoti e ogni generazione futura ne saranno le pustole. Sblocca una variante del finale Lord ancestrale."]
        cords: [4296, 3452]
        map_title: "Mending Rune of the Fell Curse"
      - id: "2_4"
        icon: "/img/icons/keys/great_runes/edited/03116.png"
        data: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+Perfect+Order\">Mending Rune of Perfect Order</a>", "Dropped by Goldmask after completing his and Brother Corhyn's questline", "Rune discovered by the noble Goldmask. A rune of transcendental ideology which will attempt to perfect the Golden Order. Unlocks a variant of the Elden Lord ending."]
        data_it: ["<a href=\"https://eldenring.wiki.fextralife.com/Mending+Rune+of+Perfect+Order\">Runa risolutiva dell'Ordine perfetto</a>", "Lasciata da Maschera d'oro dopo aver completato la sua missione e quella di Fratello Corhyn", "Runa scoperta dal nobile Maschera d'oro. Una runa di ideologia trascendentalista che tenta di perfezionare l'Ordine Aureo. Sblocca una variante del finale Lord ancestrale."]
        #TODO: cords
        map_title: "Mending Rune of Perfect Order"